[tool.bandit]
exclude_dirs = [".venv", "tests", "__pycache__", "node_modules"]
skips = ["B101"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "S", "D", "I", "UP"]
ignore = ["D100", "D104", "D203", "D213", "S101"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "D"]
"scripts/**" = ["D101", "D103", "D205", "E402", "S110", "S310", "S324", "S603", "S607"]
"logs/**" = ["D103", "D205", "S603", "S607"]
"transcription/**" = ["D101", "D103"]
"research/**" = ["D103", "D205", "S310"]
"boarddocs_loader/**" = ["D101"]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
fail-under = 80
exclude = [".venv", "tests", "docs", "build", "__pycache__"]
verbose = 2
