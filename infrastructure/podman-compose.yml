version: "3"

services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: boarddocs-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qorvault}
      POSTGRES_USER: ${POSTGRES_USER:-qorvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_ON_FIRST_DEPLOY}
    volumes:
      - boarddocs_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qorvault} -d ${POSTGRES_DB:-qorvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: docker.io/qdrant/qdrant:v1.9.0
    container_name: boarddocs-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - boarddocs_qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  boarddocs_pgdata:
  boarddocs_qdrant_storage:
